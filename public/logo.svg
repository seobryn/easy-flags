<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feFlood flood-color="#06b6d4" flood-opacity="0.3" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="softGlow" />
      <feMerge>
        <feMergeNode in="softGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="inner-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background Glass Effect -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="#06080f" fill-opacity="0.4" />
  <rect x="40" y="40" width="432" height="432" rx="80" stroke="url(#logo-gradient)" stroke-width="4" stroke-opacity="0.2" />
  <rect x="42" y="42" width="428" height="428" rx="78" stroke="url(#inner-glow)" stroke-width="1" />

  <!-- Logo Group -->
  <g filter="url(#glow)">
    <!-- Flag Pole -->
    <rect x="160" y="120" width="24" height="272" rx="12" fill="url(#logo-gradient)" />
    
    <!-- Flag Cloth: Elegant Waving Path -->
    <path d="M184 120C210 115 240 140 280 135C320 130 360 145 400 135V255C360 265 320 250 280 255C240 260 210 235 184 240V120Z" fill="url(#logo-gradient)" />
    
    <!-- Highlighting Detail (Inner Shine) -->
    <path d="M194 135C215 130 235 150 270 145C305 140 335 150 360 145" stroke="white" stroke-opacity="0.2" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
