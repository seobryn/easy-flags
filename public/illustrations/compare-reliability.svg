<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" role="img" aria-label="Reliability before and after">
  <defs>
    <linearGradient id="relBefore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1a2e" />
      <stop offset="100%" stop-color="#16111f" />
    </linearGradient>
    <linearGradient id="relAfter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#052233" />
      <stop offset="100%" stop-color="#031820" />
    </linearGradient>
  </defs>
  <!-- Left card: No flags (unreliable) -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="130" height="60" rx="12" fill="url(#relBefore)" stroke="#3a2f45" stroke-width="1.5" />
    <text x="14" y="22" fill="#b8a6c6" font-size="10" font-family="Inter, system-ui, sans-serif">No flags</text>
    <text x="14" y="44" fill="#ffc1c1" font-weight="700" font-size="20" font-family="Inter, system-ui, sans-serif">5 / mo</text>
    <circle cx="126" cy="16" r="8" fill="#f87171" />
  </g>

  <!-- Check mark in middle -->
  <g transform="translate(148,30)">
    <path d="M6 10 L12 16 L26 2" stroke="#5fb0ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <text x="10" y="-6" fill="#5fb0ff" font-size="9" font-weight="700" font-family="Inter, system-ui, sans-serif">80%</text>
  </g>

  <!-- Right card: With Easy Flags (reliable) -->
  <g transform="translate(193,10)">
    <rect x="0" y="0" width="130" height="60" rx="12" fill="url(#relAfter)" stroke="#0b5570" stroke-width="1.5" />
    <text x="14" y="22" fill="#80d4f0" font-size="10" font-family="Inter, system-ui, sans-serif">With Easy Flags</text>
    <text x="14" y="44" fill="#a5f3fc" font-weight="700" font-size="20" font-family="Inter, system-ui, sans-serif">1 / mo</text>
    <circle cx="126" cy="16" r="8" fill="#06b6d4" />
  </g>
</svg>
