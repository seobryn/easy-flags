<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" role="img" aria-label="Product fit before and after">
  <defs>
    <linearGradient id="fitBefore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1a2e" />
      <stop offset="100%" stop-color="#16111f" />
    </linearGradient>
    <linearGradient id="fitAfter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#052233" />
      <stop offset="100%" stop-color="#031820" />
    </linearGradient>
  </defs>
  <!-- Left card: No flags (poor fit) -->
  <g transform="translate(10,10)">
    <rect x="0" y="0" width="130" height="60" rx="12" fill="url(#fitBefore)" stroke="#3a2f45" stroke-width="1.5" />
    <text x="14" y="22" fill="#b8a6c6" font-size="10" font-family="Inter, system-ui, sans-serif">No flags</text>
    <text x="14" y="44" fill="#ffc1c1" font-weight="700" font-size="20" font-family="Inter, system-ui, sans-serif">20%</text>
    <circle cx="126" cy="16" r="8" fill="#f87171" />
  </g>

  <!-- Arrow with improvement -->
  <g transform="translate(148,30)">
    <path d="M0 10 L36 10" stroke="#5fb0ff" stroke-width="2.5" stroke-linecap="round" />
    <path d="M28 4 L36 10 L28 16" fill="#5fb0ff" />
    <text x="12" y="-6" fill="#5fb0ff" font-size="9" font-weight="700" font-family="Inter, system-ui, sans-serif">375%</text>
  </g>

  <!-- Right card: With Easy Flags (great fit) -->
  <g transform="translate(193,10)">
    <rect x="0" y="0" width="130" height="60" rx="12" fill="url(#fitAfter)" stroke="#0b5570" stroke-width="1.5" />
    <text x="14" y="22" fill="#80d4f0" font-size="10" font-family="Inter, system-ui, sans-serif">With Easy Flags</text>
    <text x="14" y="44" fill="#a5f3fc" font-weight="700" font-size="20" font-family="Inter, system-ui, sans-serif">75%</text>
    <circle cx="126" cy="16" r="8" fill="#06b6d4" />
  </g>
</svg>
