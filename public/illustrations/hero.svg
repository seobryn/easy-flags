<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img" aria-label="Easy Flags Dashboard Illustration" fill="none">
  <defs>
    <linearGradient id="glow-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="glow-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="glass-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08" />
      <stop offset="100%" stop-color="white" stop-opacity="0.02" />
    </linearGradient>
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="blur-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glows -->
  <circle cx="200" cy="200" r="150" fill="url(#glow-cyan)" filter="url(#blur-filter)" />
  <circle cx="700" cy="300" r="180" fill="url(#glow-blue)" filter="url(#blur-filter)" />

  <!-- Main Glass Card Container -->
  <rect x="150" y="50" width="600" height="350" rx="40" fill="url(#glass-gradient)" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
  
  <!-- Sidebar Panel -->
  <rect x="150" y="50" width="180" height="350" rx="40" fill="rgba(255,255,255,0.02)" />
  <rect x="180" y="90" width="120" height="12" rx="6" fill="rgba(255,255,255,0.1)" />
  <rect x="180" y="125" width="100" height="10" rx="5" fill="rgba(255,255,255,0.05)" />
  <rect x="180" y="155" width="100" height="10" rx="5" fill="rgba(255,255,255,0.05)" />
  <rect x="180" y="185" width="100" height="10" rx="5" fill="rgba(255,255,255,0.05)" />
  
  <!-- Header within Card -->
  <rect x="370" y="90" width="220" height="16" rx="8" fill="rgba(255,255,255,0.15)" />
  <circle cx="690" cy="98" r="15" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" />

  <!-- Feature Flag List -->
  <!-- Flag 1: Active -->
  <g transform="translate(370, 140)">
    <rect width="340" height="60" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(6,182,212,0.2)" />
    <rect x="20" y="22" width="120" height="10" rx="5" fill="white" fill-opacity="0.8" />
    <rect x="20" y="38" width="60" height="6" rx="3" fill="rgba(255,255,255,0.3)" />
    <!-- Toggle On -->
    <rect x="270" y="18" width="44" height="24" rx="12" fill="url(#accent-cyan)" />
    <circle cx="302" cy="30" r="8" fill="white" filter="url(#glow-filter)" />
  </g>

  <!-- Flag 2: Inactive -->
  <g transform="translate(370, 215)">
    <rect width="340" height="60" rx="20" fill="rgba(255,255,255,0.03)" />
    <rect x="20" y="22" width="140" height="10" rx="5" fill="white" fill-opacity="0.4" />
    <rect x="20" y="38" width="80" height="6" rx="3" fill="rgba(255,255,255,0.2)" />
    <!-- Toggle Off -->
    <rect x="270" y="18" width="44" height="24" rx="12" fill="rgba(255,255,255,0.1)" />
    <circle cx="282" cy="30" r="8" fill="rgba(255,255,255,0.4)" />
  </g>

  <!-- Flag 3: Percentage Rollout -->
  <g transform="translate(370, 290)">
    <rect width="340" height="60" rx="20" fill="rgba(255,255,255,0.03)" />
    <rect x="20" y="22" width="100" height="10" rx="5" fill="white" fill-opacity="0.8" />
    <!-- Progress Bar -->
    <rect x="20" y="38" width="180" height="6" rx="3" fill="rgba(255,255,255,0.08)" />
    <rect x="20" y="38" width="117" height="6" rx="3" fill="#06b6d4" />
    <!-- Badge -->
    <rect x="270" y="22" width="44" height="16" rx="8" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.3)" />
    <text x="292" y="33" fill="#06b6d4" font-family="Arial" font-size="8" text-anchor="middle" font-weight="bold">65%</text>
  </g>

  <!-- Floating Elements for depth -->
  <g opacity="0.6">
    <rect x="100" y="320" width="120" height="80" rx="20" fill="url(#glass-gradient)" stroke="rgba(255,255,255,0.1)" filter="url(#glow-filter)" transform="rotate(-10, 160, 360)" />
    <circle cx="160" cy="360" r="12" fill="#06b6d4" />
  </g>

  <g opacity="0.4">
    <rect x="750" y="80" width="100" height="100" rx="50" fill="url(#glass-gradient)" stroke="rgba(255,255,255,0.1)" transform="rotate(15, 800, 130)" />
    <rect x="785" y="115" width="30" height="30" rx="8" fill="#3b82f6" />
  </g>

</svg>
